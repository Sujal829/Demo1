version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: trading_mongodb
    restart: always
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin_password

  redis:
    image: redis:7.0-alpine
    container_name: trading_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: trading_backend
    restart: always
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    environment:
      - MONGODB_URL=mongodb://admin:admin_password@mongodb:27017/
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - mongodb
      - redis
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  celery_worker:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: trading_celery_worker
    restart: always
    volumes:
      - ./backend:/app
    environment:
      - MONGODB_URL=mongodb://admin:admin_password@mongodb:27017/
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - mongodb
      - redis
      - backend
    command: celery -A app.worker.celery_app worker --loglevel=info

  celery_beat:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: trading_celery_beat
    restart: always
    volumes:
      - ./backend:/app
    environment:
      - MONGODB_URL=mongodb://admin:admin_password@mongodb:27017/
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - mongodb
      - redis
      - celery_worker
    command: celery -A app.worker.celery_app beat --loglevel=info

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trading_frontend
    restart: always
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  mongodb_data:
  redis_data:
